name: Build Mangago Extension

on:
  push:
    branches:
      - main
    paths:
      - 'src/en/mangago/**'
      - '.github/workflows/build_mangago.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Mangago extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Mangago extension
        run: ./gradlew :en:mangago

      - name: Upload Mangago APK
        uses: actions/upload-artifact@v4
        with:
          name: mangago-apk
          path: "**/*.apk"
          retention-days: 7